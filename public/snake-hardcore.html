<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    text-align: center;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 20px;
  }

  select {
    font-family: inherit;
    font-size: 16px;
    padding: 6px 10px;
    margin: 0 5px;
    border: 1px solid #444;
    border-radius: 0;
    background: #1c1c1c;
    color: #eee;
  }

  .controls {
    margin-bottom: 14px;
  }

  button#playBtn {
    font-family: inherit;
    font-size: 16px;
    padding: 7px 18px;
    margin-left: 8px;
    border: 1px solid #eee;
    border-radius: 0;
    background: #eee;
    color: #111;
    cursor: pointer;
  }

  .topbar {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .board-wrap {
    position: relative;
    display: inline-block;
    max-width: 95vw;
  }

  canvas {
    background: #1a1a1a;
    border: 2px solid #444;
    display: block;
    width: 100%;
    max-width: 1200px;
    height: auto;
  }

  @keyframes lucky67 {
    0%   { transform: scale(1) translate(0, 0) rotate(0deg); }
    8%   { transform: scale(1.06) translate(-14px, 9px) rotate(-2deg); }
    16%  { transform: scale(1.1) translate(13px, -11px) rotate(2.5deg); }
    24%  { transform: scale(1.04) translate(-16px, -8px) rotate(-3deg); }
    32%  { transform: scale(1.12) translate(15px, 12px) rotate(3deg); }
    40%  { transform: scale(1.05) translate(-11px, 10px) rotate(-2deg); }
    48%  { transform: scale(1.14) translate(12px, -9px) rotate(2deg); }
    56%  { transform: scale(1.06) translate(-9px, 7px) rotate(-1.5deg); }
    64%  { transform: scale(1.1) translate(8px, -6px) rotate(1.5deg); }
    72%  { transform: scale(1.04) translate(-6px, 5px) rotate(-1deg); }
    80%  { transform: scale(1.07) translate(5px, -4px) rotate(1deg); }
    88%  { transform: scale(1.02) translate(-3px, 2px) rotate(0deg); }
    100% { transform: scale(1) translate(0, 0) rotate(0deg); }
  }

  .board-wrap.shake canvas {
    animation: lucky67 0.6s ease-in-out;
    position: relative;
    z-index: 5;
  }

  @keyframes bombChaos {
    0%   { transform: scale(1) translate(0,0) rotate(0deg); filter: brightness(1) contrast(1) hue-rotate(0deg); }
    5%   { transform: scale(1.05) translate(-20px, 14px) rotate(-3deg); filter: brightness(1.8) contrast(1.4) hue-rotate(20deg); }
    10%  { transform: scale(0.97) translate(18px, -16px) rotate(3deg); filter: brightness(0.4) contrast(1.6) hue-rotate(-30deg); }
    15%  { transform: scale(1.08) translate(-22px, -10px) rotate(-4deg); filter: brightness(2) contrast(1.2) hue-rotate(40deg); }
    20%  { transform: scale(0.95) translate(20px, 18px) rotate(4deg); filter: brightness(0.5) contrast(1.8) hue-rotate(-20deg); }
    25%  { transform: scale(1.06) translate(-16px, 12px) rotate(-2deg); filter: brightness(1.9) contrast(1.3) hue-rotate(30deg); }
    30%  { transform: scale(0.98) translate(15px, -14px) rotate(3deg); filter: brightness(0.4) contrast(1.7) hue-rotate(-40deg); }
    35%  { transform: scale(1.09) translate(-18px, -9px) rotate(-3.5deg); filter: brightness(1.7) contrast(1.5) hue-rotate(15deg); }
    40%  { transform: scale(0.96) translate(17px, 15px) rotate(3.5deg); filter: brightness(0.5) contrast(1.4) hue-rotate(-25deg); }
    45%  { transform: scale(1.07) translate(-14px, 11px) rotate(-2.5deg); filter: brightness(1.6) contrast(1.6) hue-rotate(35deg); }
    50%  { transform: scale(0.99) translate(13px, -12px) rotate(2.5deg); filter: brightness(0.6) contrast(1.3) hue-rotate(-15deg); }
    55%  { transform: scale(1.05) translate(-12px, 8px) rotate(-2deg); filter: brightness(1.5) contrast(1.2) hue-rotate(20deg); }
    60%  { transform: scale(0.98) translate(10px, -9px) rotate(2deg); filter: brightness(0.7) contrast(1.4) hue-rotate(-10deg); }
    65%  { transform: scale(1.04) translate(-9px, 7px) rotate(-1.5deg); filter: brightness(1.4) contrast(1.1) hue-rotate(10deg); }
    70%  { transform: scale(1) translate(8px, -6px) rotate(1.5deg); filter: brightness(0.8) contrast(1.2) hue-rotate(-8deg); }
    75%  { transform: scale(1.03) translate(-6px, 5px) rotate(-1deg); filter: brightness(1.3) contrast(1.1) hue-rotate(8deg); }
    80%  { transform: scale(1) translate(5px, -4px) rotate(1deg); filter: brightness(1) contrast(1) hue-rotate(0deg); }
    85%  { transform: scale(1.02) translate(-3px, 2px) rotate(-0.5deg); filter: brightness(1.1) contrast(1) hue-rotate(0deg); }
    100% { transform: scale(1) translate(0,0) rotate(0deg); filter: brightness(1) contrast(1) hue-rotate(0deg); }
  }

  .board-wrap.bombchaos canvas {
    animation: bombChaos 0.5s linear;
    position: relative;
    z-index: 5;
  }

  @keyframes newBest {
    0%   { transform: scale(1) rotate(0deg); filter: brightness(1) saturate(1); }
    8%   { transform: scale(1.15) rotate(-2deg); filter: brightness(1.5) saturate(1.8); }
    16%  { transform: scale(1.2) rotate(2deg); filter: brightness(1.8) saturate(2); }
    24%  { transform: scale(1.15) rotate(-3deg); filter: brightness(1.4) saturate(1.6); }
    32%  { transform: scale(1.22) rotate(3deg); filter: brightness(1.9) saturate(2.2); }
    40%  { transform: scale(1.15) rotate(-2deg); filter: brightness(1.3) saturate(1.5); }
    50%  { transform: scale(1.25) rotate(0deg); filter: brightness(2) saturate(2.4); }
    60%  { transform: scale(1.15) rotate(2deg); filter: brightness(1.4) saturate(1.6); }
    70%  { transform: scale(1.1) rotate(-1deg); filter: brightness(1.2) saturate(1.3); }
    80%  { transform: scale(1.08) rotate(1deg); filter: brightness(1.1) saturate(1.1); }
    90%  { transform: scale(1.03) rotate(0deg); filter: brightness(1.05) saturate(1.05); }
    100% { transform: scale(1) rotate(0deg); filter: brightness(1) saturate(1); }
  }

  .board-wrap.newbest canvas {
    animation: newBest 1.1s ease-in-out;
    position: relative;
    z-index: 6;
    box-shadow: 0 0 60px 10px rgba(255, 215, 0, 0.8);
  }

  .best-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,215,0,0.35), transparent 70%);
    pointer-events: none;
    opacity: 0;
    z-index: 999;
  }
  .best-flash.play {
    animation: flashPulse 1.1s ease-out;
  }
  @keyframes flashPulse {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .best-text-pop {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 48px;
    font-weight: 800;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 40px rgba(255,215,0,0.6);
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
  }
  .best-text-pop.play {
    animation: bestTextPop 1.1s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes bestTextPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-8deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(4deg); }
    35%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(0deg); }
  }

  .bottom-bar {
    width: 100%;
    max-width: 1200px;
    margin: 6px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hint {
    text-align: left;
    font-size: 13px;
    color: #666;
  }

  .speed-tag {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  .game-area {
    position: relative;
    display: none;
  }
  .game-area.active { display: block; }
  .menu.active { display: block; }
  .menu { display: block; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(17,17,17,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .overlay div { margin-bottom: 12px; font-size: 18px; }
  .overlay button {
    font-family: inherit;
    font-size: 16px;
    padding: 7px 18px;
    border: 1px solid #eee;
    border-radius: 0;
    background: #eee;
    color: #111;
    cursor: pointer;
    margin: 4px;
  }
  .restart-hint {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
  }

  .mode-badge {
    display: inline-block;
    padding: 6px 14px;
    margin: 0 5px;
    border: 1px solid #e74c3c;
    color: #e74c3c;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .rank-panel {
    margin-top: 26px;
    border: 1px solid #333;
    padding: 16px 18px;
    min-width: 320px;
    text-align: left;
  }
  .rank-title {
    font-size: 13px;
    letter-spacing: 3px;
    color: #888;
    margin-bottom: 12px;
    text-align: center;
  }
  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    font-size: 14px;
    border-bottom: 1px solid #222;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { width: 26px; color: #666; font-variant-numeric: tabular-nums; }
  .rank-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-score { color: #2ecc40; font-weight: 700; font-variant-numeric: tabular-nums; }
  .rank-row.me .rank-name { color: #f1c40f; }
  .rank-row.top1 .rank-num { color: #f1c40f; }
  .rank-empty { color: #555; font-size: 13px; text-align: center; padding: 10px 0; }
  .save-status { font-size: 12px; color: #777; margin-top: 8px; }
  .cheat-panel {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 210px;
    background: rgba(20,20,22,0.96);
    border: 1px solid #7d3c98;
    border-radius: 6px;
    padding: 12px 14px;
    text-align: left;
    z-index: 999;
    font-size: 12px;
  }
  .cheat-title {
    color: #bb8fce;
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cheat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
    color: #ccc;
  }
  .cheat-row input[type="number"] {
    width: 62px;
    background: #1c1c1c;
    border: 1px solid #444;
    color: #eee;
    font-family: inherit;
    font-size: 12px;
    padding: 3px 5px;
  }
  .cheat-btn {
    background: #4a235a;
    border: 1px solid #7d3c98;
    color: #d7bde2;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .cheat-btn:hover { background: #6c3483; }
  .cheat-toggle { cursor: pointer; user-select: none; }
  .cheat-toggle.on { color: #2ecc40; }
  .cheat-toggle.off { color: #666; }
  .cheat-hint { color: #666; font-size: 10px; margin-top: 8px; line-height: 1.5; }

</style>
</head>
<body>

<div class="cheat-panel" id="cheatPanel" style="display:none">

  <div class="menu" id="menu">

<div class="best-flash" id="bestFlash"></div>
<div class="best-text-pop" id="bestTextPop">NEW BEST!</div>

<script>
// ---------- 랭킹 (Supabase 연동) ----------
const SUPABASE_URL = "https://afcybstphdspdrgkvkzv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmY3lic3RwaGRzcGRyZ2t2a3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODkwMjAsImV4cCI6MjEwMDI2NTAyMH0.6WNnaXFopFhC_N2IgnQbY8MrCSITRop0am4MBg28qAc";
const GAME_ID = "snake_hardcore";

// 채팅 앱에서 ?player=이름 으로 전달받음
const PLAYER =
  new URLSearchParams(location.search).get("player") || "익명";

const SB_HEAD = {
  apikey: SUPABASE_ANON_KEY,
  Authorization: "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json",
};

async function loadRanking() {
  const el = document.getElementById("rankList");
  try {
    const res = await fetch(
      SUPABASE_URL +
        "/rest/v1/game_scores?apikey=" + SUPABASE_ANON_KEY +
        "&game=eq." + GAME_ID +
        "&select=player,score&order=score.desc&limit=100",
      { headers: SB_HEAD }
    );
    if (!res.ok) throw new Error(res.status);
    const rows = await res.json();

    // 플레이어별 최고 점수만 남김
    const bestByPlayer = {};
    rows.forEach((r) => {
      if (!bestByPlayer[r.player] || r.score > bestByPlayer[r.player]) {
        bestByPlayer[r.player] = r.score;
      }
    });
    const ranked = Object.entries(bestByPlayer)
      .map(([player, score]) => ({ player, score }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);

    if (ranked.length === 0) {
      el.innerHTML = '<div class="rank-empty">아직 기록이 없습니다</div>';
      return;
    }
    el.innerHTML = ranked
      .map((r, i) => {
        const cls =
          "rank-row" + (r.player === PLAYER ? " me" : "") + (i === 0 ? " top1" : "");
        const medal = i === 0 ? "1" : i === 1 ? "2" : i === 2 ? "3" : String(i + 1);
        return (
          '<div class="' + cls + '">' +
          '<span class="rank-num">' + medal + '</span>' +
          '<span class="rank-name">' + escapeText(r.player) + "</span>" +
          '<span class="rank-score">' + r.score + "</span>" +
          "</div>"
        );
      })
      .join("");
  } catch (e) {
    el.innerHTML = '<div class="rank-empty">랭킹을 불러오지 못했습니다</div>';
  }
}

function escapeText(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function submitScore(score, maxSpeedMultiplier) {
  const statusEl = document.getElementById("saveStatus");
  if (score <= 0) {
    if (statusEl) statusEl.textContent = "";
    return;
  }
  if (statusEl) statusEl.textContent = "기록 저장 중...";
  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/game_scores?apikey=" + SUPABASE_ANON_KEY,
      {
        method: "POST",
        headers: SB_HEAD,
        body: JSON.stringify({
          game: GAME_ID,
          player: PLAYER,
          score: score,
          max_speed: maxSpeedMultiplier,
        }),
      }
    );
    if (!res.ok) throw new Error(res.status);
    if (statusEl) statusEl.textContent = "기록 저장 완료 (" + PLAYER + ")";
    loadRanking();
  } catch (e) {
    if (statusEl) statusEl.textContent = "기록 저장 실패";
  }
}

loadRanking();
</script>

<script>
// ---------- 관리자 치트 ----------
const IS_ADMIN = new URLSearchParams(location.search).get("admin") === "1";
const CHEAT = { wall: false, body: false, god: false, used: false };
window.CHEAT = CHEAT; // 다른 스크립트 블록(랭킹 등록)에서도 참조

function setupCheatPanel() {
  if (!IS_ADMIN) return;
  const panel = document.getElementById("cheatPanel");
  panel.style.display = "block";

  function bindToggle(id, key) {
    const el = document.getElementById(id);
    el.addEventListener("click", () => {
      CHEAT[key] = !CHEAT[key];
      CHEAT.used = true;
      el.textContent = CHEAT[key] ? "ON" : "OFF";
      el.className = "cheat-toggle " + (CHEAT[key] ? "on" : "off");
    });
  }
  bindToggle("cheatWall", "wall");
  bindToggle("cheatBody", "body");
  bindToggle("cheatGod", "god");

  // 속도 직접 조절
  document.getElementById("cheatSpeed").addEventListener("change", (e) => {
    const v = Math.max(5, Math.min(400, Number(e.target.value) || 120));
    speed = v;
    CHEAT.used = true;
    updateSpeedTag();
    if (!gameOver && !paused) {
      stopLoop();
      loopId = setInterval(tick, speed);
    }
  });

  // 점수 직접 수정
  document.getElementById("cheatScore").addEventListener("change", (e) => {
    score = Math.max(0, Number(e.target.value) || 0);
    CHEAT.used = true;
    updateTopbar();
  });

  // 길이 늘리기
  document.getElementById("cheatGrow").addEventListener("click", () => {
    CHEAT.used = true;
    const tail = snake[snake.length - 1];
    for (let i = 0; i < 10; i++) snake.push({ x: tail.x, y: tail.y });
  });

  document.getElementById("cheatHide").addEventListener("click", () => {
    panel.style.display = "none";
  });

  // -(마이너스) 키로 패널 열고 닫기 (입력창에 포커스 중이면 무시)
  window.addEventListener("keydown", (e) => {
    if (e.key === "-" && !e.ctrlKey && !e.metaKey) {
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      e.preventDefault();
      panel.style.display = panel.style.display === "none" ? "block" : "none";
    }
  });
}

const MODES = {
  hardcore: { speed: 120, wrap: false, rampAmount: 4, cols: 20, rows: 10, event: false },
};
// 속도 하한선을 크게 낮춰서 계속 빨라지도록 (기존 50ms = 2.4배에서 막혔음)
const MIN_SPEED = 14;

const SKINS = {
  green:   { body: '#2ecc40' },
  blue:    { body: '#3498db' },
  red:     { body: '#e74c3c' },
  gold:    { body: '#f1c40f' },
  rainbow: { body: 'rainbow' },
};

const skinSelect = document.getElementById('skinSelect');
let selectedMode = MODES.hardcore;
let selectedModeId = 'hardcore';
let selectedSkin = SKINS.green;

document.getElementById('playBtn').addEventListener('click', () => {
  selectedModeId = 'hardcore';
  selectedMode = MODES.hardcore;
  selectedSkin = SKINS[skinSelect.value];
  document.getElementById('menu').classList.remove('active');
  document.getElementById('menu').style.display = 'none';
  document.getElementById('gameArea').classList.add('active');
  resetAndRun();
});

document.getElementById('retryBtn').addEventListener('click', () => { hideOverlay(); resetAndRun(); });
document.getElementById('menuBtn').addEventListener('click', () => {
  hideOverlay();
  document.getElementById('gameArea').classList.remove('active');
  document.getElementById('menu').style.display = 'block';
  stopLoop();
});

// ---------- 게임 로직 ----------
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let COLS = 20, ROWS = 10;
let CELL = canvas.width / COLS;

let snake, dir, dirQueue, item, obstacles, score, best, speed, loopId, paused, gameOver;
let itemTimer = null;
let itemPopTime = 0; // 아이템이 막 등장한 시각 (팝인 애니메이션용)
let startTime = 0;
const BASE_SPEED = 120;

function loadBest(modeId) {
  return Number(localStorage.getItem('snake_best_' + modeId) || 0);
}
function saveBest(modeId, val) {
  localStorage.setItem('snake_best_' + modeId, String(val));
}

function resetAndRun() {
  gameOver = false;
  paused = false;
  score = 0;
  speed = selectedMode.speed;
  best = loadBest(selectedModeId);
  startTime = performance.now();
  COLS = selectedMode.cols;
  ROWS = selectedMode.rows;
  CELL = canvas.width / COLS;
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX,     y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY },
  ];
  dir = { x: 1, y: 0 };
  dirQueue = [];
  obstacles = [];
  if (itemTimer) clearTimeout(itemTimer);
  item = spawnItem('apple');
  updateTopbar();
  updateSpeedTag();
  stopLoop();
  loopId = setInterval(tick, speed);
  if (selectedMode.event) scheduleBombEvent();
  draw();
}

function stopLoop() {
  if (loopId) clearInterval(loopId);
}

function scheduleBombEvent() {
  if (gameOver || !selectedMode.event) return;
  const delay = 2000 + Math.random() * 2500; // 2~4.5초마다 폭탄 등장 시도
  itemTimer = setTimeout(() => {
    if (gameOver || !selectedMode.event) return;
    // 사과를 없애고 그 자리에 짠! 하고 폭탄이 튀어나옴 (다른 위치)
    item = spawnItem('bomb');
    itemPopTime = performance.now();
    triggerBombChaos();
    draw();
    itemTimer = setTimeout(() => {
      if (gameOver || !selectedMode.event) return;
      // 폭탄 소멸, 다시 사과 등장
      item = spawnItem('apple');
      itemPopTime = performance.now();
      triggerBombChaos();
      draw();
      scheduleBombEvent();
    }, 2500); // 폭탄 유지 시간
  }, delay);
}

function spawnItem(type) {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (
    snake.some(s => s.x === pos.x && s.y === pos.y) ||
    obstacles.some(o => o.x === pos.x && o.y === pos.y)
  );
  return { x: pos.x, y: pos.y, type };
}

function updateTopbar() {
  document.getElementById('scoreTag').textContent = score;
}

function updateSpeedTag() {
  const multiplier = (BASE_SPEED / speed).toFixed(2);
  document.getElementById('speedTag').textContent = 'SPEED: x' + multiplier;
}

function triggerLucky67() {
  const el = document.querySelector('.board-wrap');
  el.classList.remove('shake');
  void el.offsetWidth; // 리플레이 되게 강제로 리플로우
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 600);
}

function triggerBombChaos() {
  const el = document.querySelector('.board-wrap');
  el.classList.remove('bombchaos');
  void el.offsetWidth;
  el.classList.add('bombchaos');
  setTimeout(() => el.classList.remove('bombchaos'), 500);
}

function triggerNewBest() {
  const el = document.querySelector('.board-wrap');
  const flash = document.getElementById('bestFlash');
  const textPop = document.getElementById('bestTextPop');

  el.classList.remove('newbest');
  flash.classList.remove('play');
  textPop.classList.remove('play');
  void el.offsetWidth;

  el.classList.add('newbest');
  flash.classList.add('play');
  textPop.classList.add('play');

  setTimeout(() => {
    el.classList.remove('newbest');
    flash.classList.remove('play');
    textPop.classList.remove('play');
  }, 1100);
}

function tick() {
  if (paused || gameOver) return;
  if (dirQueue.length > 0) {
    dir = dirQueue.shift();
  }
  let head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (selectedMode.wrap || CHEAT.wall) {
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;
  } else if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    if (!CHEAT.god) return endGame();
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;
  }

  if (!CHEAT.body && !CHEAT.god && snake.some(s => s.x === head.x && s.y === head.y)) return endGame();
  if (!CHEAT.god && obstacles.some(o => o.x === head.x && o.y === head.y)) return endGame();

  snake.unshift(head);

  if (head.x === item.x && head.y === item.y) {
    if (item.type === 'bomb') return endGame();
    score += 1;
    updateTopbar();
    if (score % 67 === 0) triggerLucky67();
    // 다음 사과 등장 (Bomb 모드면 폭탄 타이머가 알아서 다음 전환을 관리하므로 그냥 사과로 스폰)
    item = spawnItem('apple');
    if (selectedMode.rampAmount > 0 && speed > MIN_SPEED) {
      // 빨라질수록 감속 폭을 줄여서, 끝없이 조금씩 계속 빨라지게 함
      const step = Math.max(0.5, speed / 30);
      speed = Math.max(MIN_SPEED, speed - step);
      updateSpeedTag();
      stopLoop();
      loopId = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  stopLoop();
  if (itemTimer) clearTimeout(itemTimer);
  if (score > best) {
    best = score;
    saveBest(selectedModeId, best);
    updateTopbar();
    if (score > 0) triggerNewBest();
  }
  const survivedSec = ((performance.now() - startTime) / 1000).toFixed(1);
  const maxMult = (BASE_SPEED / speed).toFixed(2);
  document.getElementById('finalScoreText').innerHTML =
    `Score: ${score} (Best: ${best})<br>Survived: ${survivedSec}s &nbsp;·&nbsp; Max Speed: x${maxMult}`;
  document.getElementById('overlay').classList.add('show');
  submitScore(score, Number(maxMult));
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function draw() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  for (let i = 1; i < COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (let j = 1; j < ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * CELL);
    ctx.lineTo(canvas.width, j * CELL);
    ctx.stroke();
  }

  ctx.fillStyle = '#888';
  obstacles.forEach(o => {
    ctx.fillRect(o.x * CELL + 1, o.y * CELL + 1, CELL - 2, CELL - 2);
  });

  // 아이템 (사과 또는 폭탄) - 갓 등장했을 땐 팝인 효과로 튀어나오게
  const elapsed = performance.now() - itemPopTime;
  const popDuration = 260;
  let scale = 1;
  if (elapsed >= 0 && elapsed < popDuration) {
    const t = elapsed / popDuration;
    // 오버슈트 팝인: 0 -> 1.4 -> 1.0
    scale = t < 0.6
      ? (t / 0.6) * 1.4
      : 1.4 - ((t - 0.6) / 0.4) * 0.4;
  }

  const isBombItem = item.type === 'bomb';
  const cx = item.x * CELL + CELL / 2;
  const cy = item.y * CELL + CELL / 2;
  const size = (CELL - 6) * scale;

  ctx.save();
  ctx.shadowColor = isBombItem ? '#ff2ec4' : '#e74c3c';
  ctx.shadowBlur = isBombItem ? 26 : 18;
  ctx.fillStyle = isBombItem ? '#ff2ec4' : '#e74c3c';
  ctx.fillRect(cx - size / 2, cy - size / 2, size, size);
  ctx.restore();

  // 팝인 애니메이션이 진행 중이면 다음 프레임에서도 갱신되도록 예약
  if (elapsed >= 0 && elapsed < popDuration) {
    requestAnimationFrame(draw);
  }

  snake.forEach((seg, i) => {
    let color;
    if (selectedSkin.body === 'rainbow') {
      const hues = ['#e74c3c', '#f1c40f', '#2ecc40', '#3498db', '#9b59b6'];
      color = hues[i % hues.length];
    } else {
      color = selectedSkin.body;
    }
    ctx.fillStyle = color;
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
  });
}

// ---------- 입력 ----------
window.addEventListener('keydown', (e) => {
  if (gameOver) {
    const k = e.key.toLowerCase();
    if (k === 'r' || e.key === 'ㄱ') {
      e.preventDefault();
      hideOverlay();
      resetAndRun();
    }
    return;
  }
  const key = e.key.toLowerCase();
  const map = {
    arrowup: { x: 0, y: -1 }, w: { x: 0, y: -1 },
    arrowdown: { x: 0, y: 1 }, s: { x: 0, y: 1 },
    arrowleft: { x: -1, y: 0 }, a: { x: -1, y: 0 },
    arrowright: { x: 1, y: 0 }, d: { x: 1, y: 0 },
  };
  if (map[key]) {
    e.preventDefault();
    const nd = map[key];
    queueDir(nd);
  } else if (key === ' ') {
    e.preventDefault();
    if (!gameOver) paused = !paused;
  }
});

function queueDir(nd) {
  // 큐에 이미 들어있는 마지막 방향(없으면 현재 진행 방향) 기준으로 되돌기 방지
  const last = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
  if (nd.x === -last.x && nd.y === -last.y) return; // 정반대 방향 무시
  if (nd.x === last.x && nd.y === last.y) return;   // 동일 방향 중복 무시
  if (dirQueue.length >= 2) return; // 큐는 최대 2개까지만 (입력 폭주 방지)
  dirQueue.push(nd);
}

// 모바일 터치 스와이프
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  if (gameOver) {
    hideOverlay();
    resetAndRun();
    return;
  }
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });

canvas.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  let nd;
  if (Math.abs(dx) > Math.abs(dy)) {
    nd = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
  } else {
    nd = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
  }
  queueDir(nd);
}, { passive: true });
setupCheatPanel();
</script>
